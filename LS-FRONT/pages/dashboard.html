<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../css/import.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>
    <div class="modal_overlay" id="dashboard-modal">
        <div class="modal">
            <h2 id="dashboard-modal-titulo">Ação</h2>
            <p id="dashboard-modal-descricao"></p>
            <input type="text" id="dashboard-modal-input-1" placeholder="">
            <input type="text" id="dashboard-modal-input-2" placeholder="">
            <p class="erro" id="dashboard-modal-erro"></p>
            <div class="modal_botoes">
                <button id="dashboard-modal-confirmar">Confirmar</button>
                <button id="dashboard-modal-cancelar">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="telas">
        <div class="tela_ dashboard visivel" id="dashboard-card">
            <div class="spinner" id="dashboard-spinner"></div>
            <h1 id="dashboard-titulo">Dashboard</h1>
            <p class="dash_mensagem" id="dashboard-mensagem">Aguarde um momento</p>

            <div class="dash_card" id="dashboard-perfil" style="display:none;">
                <div class="dash_avatar" id="dashboard-avatar">--</div>
                <div class="dash_identidade">
                    <p class="dash_nome" id="dashboard-usuario">Usuário</p>
                    <p class="dash_email" id="dashboard-email">email@exemplo.com</p>
                </div>
                <p class="dash_desde" id="dashboard-desde">membro desde --</p>
            </div>

            <button class="dash_btn" type="button" id="dashboard-botao-editar" style="display:none;">
                <span class="material-symbols-outlined dash_btn_icon">edit</span>
                <span class="dash_btn_label">Editar usuário</span>
                <span class="material-symbols-outlined dash_btn_arrow">chevron_right</span>
            </button>

            <button class="dash_btn" type="button" id="dashboard-botao-senha" style="display:none;">
                <span class="material-symbols-outlined dash_btn_icon">lock</span>
                <span class="dash_btn_label">Alterar senha</span>
                <span class="material-symbols-outlined dash_btn_arrow">chevron_right</span>
            </button>

            <button class="dash_btn danger" type="button" id="dashboard-botao-excluir" style="display:none;">
                <span class="material-symbols-outlined dash_btn_icon">delete</span>
                <span class="dash_btn_label">Excluir conta</span>
                <span class="material-symbols-outlined dash_btn_arrow">chevron_right</span>
            </button>

            <a href="../index.html" id="dashboard-link-login" style="display:none">
                <button class="botao_confirmar" type="button">Voltar ao login</button>
            </a>

            <button class="dash_logout" type="button" id="dashboard-botao-logout" style="display:none">
                <span class="material-symbols-outlined dash_logout_icon">logout</span>
                sair da conta
            </button>
        </div>
    </div>

    <div class="mini_player" id="mini-player">
        <div class="mini_player_icone" id="mini-player-icone">
            <svg viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg" overflow="visible">
                <rect x="3" y="21" width="22" height="3" rx="9" fill="#6e3117"/>
                <path d="M5 10 h18 l-2 12 H7 Z" fill="#7a3a1e"/>
                <path d="M20 13 Q26 12 25 17 Q24 20 20 18" stroke="#7a3a1e" stroke-width="2" fill="none" stroke-linecap="round"/>
                <path class="fumaca fumaca1" d="M9 7 Q8 5 9 3"/>
                <path class="fumaca fumaca2" d="M14 7 Q13 5 14 3"/>
                <path class="fumaca fumaca3" d="M19 7 Q18 5 19 3"/>
            </svg>
        </div>

        <div class="mini_player_info">
            <div class="player_topo">
                <div class="pontinhos_deco pausado">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span>Música</span>
                <button id="musica-pause" class="material-symbols-outlined">pause</button>
            </div>
            <div class="volume">
                <span class="material-symbols-outlined" id="volume-icone">volume_down</span>
                <input type="range" min="0" max="100" value="10" id="volume-controle">
                <span id="volume-valor">10%</span>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/player.js"></script>
    <script src="../js/dashboard.js"></script>
</body>
</html>
